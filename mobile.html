<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bread Connection - Monthly Overview</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <style>
        :root {
            --cyan-dark2: #0C343D;
            --cyan-dark1: #134F5C;
            --cyan-base: #45818E;
            --cyan-light1: #76A5AF;
            --cyan-light2: #A2C4C9;
            --cyan-light3: #D0E0E3;
            --accent-gold: #d4a843;
            --positive: #2c7a3a;
            --negative: #c43c3c;
            --white: #ffffff;
            --gray-light: #f0f6f7;
            --gray-border: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--gray-light);
            color: var(--cyan-dark2);
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background-color: var(--cyan-dark1);
            color: var(--white);
            padding: 14px 16px;
            text-align: center;
        }
        .header h1 {
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .header p {
            font-size: 10px;
            opacity: 0.8;
            margin-top: 2px;
        }

        .page-title {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--cyan-dark2);
            padding: 14px 16px 6px;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 10px;
            padding: 10px 16px;
            background: var(--white);
            border-bottom: 1px solid var(--gray-border);
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-bar label {
            font-size: 12px;
            font-weight: 500;
            color: var(--cyan-dark2);
        }
        .filter-bar select {
            padding: 6px 8px;
            border: 1px solid var(--gray-border);
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            background: var(--white);
            color: var(--cyan-dark2);
        }
        .tax-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto;
        }
        .tax-toggle input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .tax-toggle label {
            font-size: 11px;
            white-space: nowrap;
        }

        /* Net note */
        .net-note {
            font-size: 10px;
            color: var(--cyan-light1);
            padding: 6px 16px 0;
        }

        /* Content */
        .content {
            padding: 0 12px 20px;
        }

        /* KPI Cards — stacked vertically */
        .kpi-stack {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0;
        }
        .kpi-card {
            background: var(--white);
            border: 1px solid var(--gray-border);
            border-left: 4px solid var(--cyan-base);
            border-radius: 6px;
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .kpi-card.positive { border-left-color: var(--positive); }
        .kpi-card.negative { border-left-color: var(--negative); }

        .kpi-label h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--cyan-base);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .kpi-card.positive .kpi-label h3 { color: var(--positive); }
        .kpi-card.negative .kpi-label h3 { color: var(--negative); }

        .kpi-label .subtitle {
            font-size: 10px;
            color: var(--cyan-light1);
            margin-top: 1px;
        }
        .kpi-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--cyan-dark2);
            font-variant-numeric: tabular-nums;
        }
        .kpi-card.positive .kpi-value { color: var(--positive); }
        .kpi-card.negative .kpi-value { color: var(--negative); }

        /* Tables */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--cyan-dark2);
            padding: 16px 4px 8px;
        }
        .table-container {
            background: var(--white);
            border: 1px solid var(--gray-border);
            border-radius: 6px;
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        thead {
            background: var(--cyan-dark1);
            color: var(--white);
        }
        th {
            padding: 7px 8px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.3px;
        }
        td {
            padding: 7px 8px;
            border-bottom: 1px solid #eee;
            font-variant-numeric: tabular-nums;
        }
        .number { text-align: right; }
        tr.total-row {
            background: var(--cyan-dark2);
            color: var(--white);
            font-weight: 700;
        }
        tr.total-row td { border-bottom-color: var(--cyan-dark1); }
        tbody tr:nth-child(even):not(.total-row) {
            background-color: #f8fafa;
        }

        /* Chart */
        .chart-container {
            background: var(--white);
            border: 1px solid var(--gray-border);
            border-radius: 6px;
            padding: 12px;
            margin-top: 16px;
        }
        .chart-container h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--cyan-dark2);
            margin-bottom: 8px;
        }
        .chart-wrapper {
            position: relative;
            height: 220px;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5000;
        }
        .spinner {
            border: 3px solid var(--cyan-light3);
            border-top: 3px solid var(--cyan-dark1);
            border-radius: 50%;
            width: 32px; height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-text {
            margin-top: 12px;
            font-size: 13px;
            color: var(--cyan-base);
        }
        .error-banner {
            background: #ffebee;
            border-left: 4px solid var(--negative);
            padding: 12px 16px;
            margin: 12px;
            border-radius: 4px;
            color: var(--negative);
            font-size: 13px;
            display: none;
        }
        .error-banner.show { display: block; }

        /* Hide on desktop */
        @media (min-width: 900px) {
            body::after {
                content: 'This page is designed for mobile devices. Please use the desktop dashboard instead.';
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background: var(--white);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                color: var(--cyan-base);
                text-align: center;
                padding: 40px;
                z-index: 10000;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="spinner-text">Fetching data from Google Sheets...</div>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <div class="header">
        <h1>🍞 Bread Connection Financial Dashboard</h1>
        <p>Live data from Google Sheets • Last updated: <span id="last-update"></span></p>
    </div>

    <h2 class="page-title">Monthly Overview</h2>

    <div class="filter-bar" id="filter-bar"></div>

    <p class="net-note" id="net-note">All figures are net amounts before tax</p>

    <div class="content">
        <div class="kpi-stack" id="kpi-cards"></div>
        <h3 class="section-title">Top 10 Accounts</h3>
        <div class="table-container">
            <table id="accounts-table"></table>
        </div>
        <div class="chart-container">
            <h3>Revenue by Channel — Last 6 Months</h3>
            <div class="chart-wrapper">
                <canvas id="channel-chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyDqdoKrfUor7TS0XKM5l1SB_kYrVSFgt40';
        const SHEET_ID = '18VgoCI2jqPPOu7zc3POLHnRcVP13krHmW6PCTj_Ivd4';
        const CHART_COLORS = ['#134F5C', '#45818E', '#76A5AF', '#A2C4C9', '#d4a843'];

        let processedData = { monthlyRevenue: {}, clientCategories: {} };
        let selectedMonth = null;
        let showAfterTax = false;
        let channelChart = null;

        // Utilities
        function formatCurrency(num) {
            if (!num) return '';
            return '฿' + Math.round(num).toLocaleString('en-US');
        }

        function parseNumber(str) {
            if (!str) return 0;
            if (typeof str === 'number') return str;
            return parseFloat(str.toString().replace(/,/g, '')) || 0;
        }

        function parseDate(dateStr) {
            if (!dateStr) return null;
            if (dateStr.includes('/')) {
                const [d, m, y] = dateStr.split('/');
                return new Date(y, m - 1, d);
            }
            return new Date(dateStr);
        }

        function getMonthKey(m, y) { return `${y}-${String(m).padStart(2, '0')}`; }

        // API
        async function fetchSheet(tab) {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${tab}?key=${API_KEY}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            return data.values || [];
        }

        // Process income data (same logic as main dashboard)
        function processIncomeData(rows) {
            rows.forEach((row, idx) => {
                if (idx < 2) return;
                const month = parseInt(row[0]);
                const year = parseInt(row[1]);
                if (!month || !year) return;
                const monthKey = getMonthKey(month, year);
                const amount = parseNumber(row[6]);
                const vatAmount = parseNumber(row[8]);
                const salesType = (row[4] || '').toString().trim().toUpperCase();
                const accountName = (row[3] || '').toString().trim().toUpperCase();
                const transactionDate = row[2];

                if (!processedData.monthlyRevenue[monthKey]) {
                    processedData.monthlyRevenue[monthKey] = {
                        total: 0, totalWithTax: 0, accounts: {}, byChannel: {}, lastRecordDate: null
                    };
                }
                const d = processedData.monthlyRevenue[monthKey];
                d.total += amount;
                d.totalWithTax += (amount + vatAmount);
                d.accounts[accountName] = (d.accounts[accountName] || 0) + amount;
                d.byChannel[salesType] = (d.byChannel[salesType] || 0) + amount;

                if (transactionDate) {
                    const newDate = parseDate(transactionDate);
                    const existingDate = parseDate(d.lastRecordDate);
                    if (!existingDate || (newDate && newDate > existingDate)) {
                        d.lastRecordDate = transactionDate;
                    }
                }
            });
        }

        function processClientData(rows) {
            rows.forEach((row, idx) => {
                if (idx < 2) return;
                const code = row[2], name = row[3];
                if (code && name) processedData.clientCategories[name] = code;
            });
        }

        function getAvailableMonths() {
            return Object.keys(processedData.monthlyRevenue).sort().reverse();
        }

        // Render
        function render() {
            const months = getAvailableMonths();
            if (!months.length) return;

            const monthKey = selectedMonth || months[0];
            const data = processedData.monthlyRevenue[monthKey];
            if (!data) return;

            const [dataYearStr, dataMonthStr] = monthKey.split('-');
            const dataYear = parseInt(dataYearStr);
            const dataMonth = parseInt(dataMonthStr);
            const now = new Date();
            const isCurrentMonth = dataYear === now.getFullYear() && dataMonth === now.getMonth() + 1;
            const daysInMonth = new Date(dataYear, dataMonth, 0).getDate();

            let daysElapsed;
            if (isCurrentMonth && data.lastRecordDate) {
                const lastRecord = parseDate(data.lastRecordDate);
                daysElapsed = lastRecord ? lastRecord.getDate() : now.getDate();
            } else {
                daysElapsed = daysInMonth;
            }

            const totalRevenue = showAfterTax ? (data.totalWithTax || data.total) : data.total;
            const dailyAverage = totalRevenue / daysElapsed;
            const projectedRevenue = dailyAverage * daysInMonth;

            let yoyChange = 0;
            const prevKey = getMonthKey(dataMonth, dataYear - 1);
            if (processedData.monthlyRevenue[prevKey]) {
                const prevData = processedData.monthlyRevenue[prevKey];
                const prevTotal = showAfterTax ? (prevData.totalWithTax || prevData.total) : prevData.total;
                const prevDaysInMonth = new Date(dataYear - 1, dataMonth, 0).getDate();
                const priorProrated = (prevTotal / prevDaysInMonth) * daysElapsed;
                yoyChange = priorProrated > 0 ? ((totalRevenue - priorProrated) / priorProrated) * 100 : 0;
            }

            const lastRecordDate = data.lastRecordDate || 'Unknown';

            // KPI cards
            document.getElementById('kpi-cards').innerHTML = `
                <div class="kpi-card">
                    <div class="kpi-label">
                        <h3>Revenue to Date</h3>
                        <div class="subtitle">Last record on ${lastRecordDate}</div>
                    </div>
                    <div class="kpi-value">${formatCurrency(totalRevenue)}</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">
                        <h3>Daily Average</h3>
                        <div class="subtitle">${daysElapsed} days elapsed</div>
                    </div>
                    <div class="kpi-value">${formatCurrency(dailyAverage)}</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">
                        <h3>Projected Revenue</h3>
                        <div class="subtitle">${daysInMonth} days in month</div>
                    </div>
                    <div class="kpi-value">${formatCurrency(projectedRevenue)}</div>
                </div>
                <div class="kpi-card ${yoyChange >= 0 ? 'positive' : 'negative'}">
                    <div class="kpi-label">
                        <h3>YoY Change</h3>
                        <div class="subtitle">prorated to ${daysElapsed} day${daysElapsed > 1 ? 's' : ''} elapsed</div>
                    </div>
                    <div class="kpi-value">${yoyChange >= 0 ? '+' : ''}${yoyChange.toFixed(1)}%</div>
                </div>
            `;

            // Top 10 Accounts table
            const accountEntries = Object.entries(data.accounts).sort((a, b) => b[1] - a[1]);
            const top10 = accountEntries.slice(0, 10);
            const monthTotal = top10.reduce((s, [, v]) => s + v, 0);

            let tableHtml = `
                <thead><tr>
                    <th>Account</th>
                    <th class="number">Total</th>
                    <th class="number">Share %</th>
                </tr></thead><tbody>
                <tr class="total-row">
                    <td>TOTAL</td>
                    <td class="number">${formatCurrency(totalRevenue)}</td>
                    <td class="number">100%</td>
                </tr>
            `;
            top10.forEach(([name, amount]) => {
                const pct = totalRevenue > 0 ? (amount / totalRevenue * 100).toFixed(1) : 0;
                tableHtml += `<tr><td>${name}</td><td class="number">${formatCurrency(amount)}</td><td class="number">${pct}%</td></tr>`;
            });
            tableHtml += '</tbody>';
            document.getElementById('accounts-table').innerHTML = tableHtml;

            // Channel bar chart — last 6 months
            const last6 = months.slice(0, 6).reverse();
            const channelNames = ['PO SALES', 'BRANCH SALES', 'DIRECT SALES'];
            const datasets = channelNames.map((ch, i) => ({
                label: ch,
                data: last6.map(k => processedData.monthlyRevenue[k]?.byChannel[ch] || 0),
                backgroundColor: CHART_COLORS[i],
                borderWidth: 0
            }));
            const chartLabels = last6.map(k => {
                const [y, m] = k.split('-');
                return new Date(parseInt(y), parseInt(m) - 1).toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
            });

            if (channelChart) channelChart.destroy();
            channelChart = new Chart(document.getElementById('channel-chart').getContext('2d'), {
                type: 'bar',
                data: { labels: chartLabels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { font: { size: 9, family: "'Inter', sans-serif" }, padding: 6, boxWidth: 10 }
                        },
                        datalabels: { display: false }
                    },
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 } } },
                        y: { stacked: true, ticks: { font: { size: 9 }, callback: v => '฿' + Math.round(v / 1000) + 'k' } }
                    }
                }
            });
        }

        function renderFilterBar() {
            const months = getAvailableMonths();
            const currentYear = new Date().getFullYear();
            const availableYears = [...new Set(months.map(m => m.split('-')[0]))]
                .filter(y => parseInt(y) <= currentYear).sort().reverse();
            const selMonth = selectedMonth || months[0];
            const selYr = selMonth.split('-')[0];
            const selMth = selMonth.split('-')[1];
            const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const monthsForYear = months.filter(m => m.startsWith(selYr));

            document.getElementById('filter-bar').innerHTML = `
                <label>Year:</label>
                <select id="yr-sel" onchange="onYearChange()">
                    ${availableYears.map(y => `<option value="${y}" ${y === selYr ? 'selected' : ''}>${y}</option>`).join('')}
                </select>
                <label>Month:</label>
                <select id="mth-sel" onchange="onMonthChange()">
                    ${monthsForYear.map(m => {
                        const mn = parseInt(m.split('-')[1]);
                        return `<option value="${mn}" ${String(mn).padStart(2,'0') === selMth ? 'selected' : ''}>${monthNames[mn-1]}</option>`;
                    }).join('')}
                </select>
                <div class="tax-toggle">
                    <input type="checkbox" id="tax-cb" ${showAfterTax ? 'checked' : ''} onchange="onTaxToggle()">
                    <label for="tax-cb">Incl. Tax (gross)</label>
                </div>
            `;
        }

        function onYearChange() {
            const yr = document.getElementById('yr-sel').value;
            const monthsForYear = getAvailableMonths().filter(m => m.startsWith(yr));
            selectedMonth = monthsForYear[0] || selectedMonth;
            renderFilterBar();
            render();
        }

        function onMonthChange() {
            const yr = document.getElementById('yr-sel').value;
            const mth = document.getElementById('mth-sel').value;
            selectedMonth = `${yr}-${String(mth).padStart(2, '0')}`;
            render();
        }

        function onTaxToggle() {
            showAfterTax = document.getElementById('tax-cb').checked;
            document.getElementById('net-note').textContent = showAfterTax
                ? 'All figures are gross amounts including tax'
                : 'All figures are net amounts before tax';
            render();
        }

        // Init
        async function init() {
            try {
                const [inc, clients] = await Promise.all([
                    fetchSheet('INC'),
                    fetchSheet('CLIENTS')
                ]);
                processIncomeData(inc);
                processClientData(clients);

                selectedMonth = getAvailableMonths()[0];
                document.getElementById('last-update').textContent = new Date().toLocaleString();
                renderFilterBar();
                render();
                document.getElementById('loading-overlay').style.display = 'none';
            } catch (e) {
                console.error('Init error:', e);
                const banner = document.getElementById('error-banner');
                banner.textContent = 'Failed to fetch data. Please check your connection and refresh.';
                banner.classList.add('show');
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
